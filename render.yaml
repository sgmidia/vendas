services:
  - type: web
    name: command-center
    env: node
    plan: free
    buildCommand: "npm install --prefix server && npm install --prefix client && npm run build --prefix client"
    startCommand: "node server/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/data.db
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
